<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Summit — Build Skills Instead</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --ink: #0D0D0D;
    --coral: #E8412A;
    --sand: #D4C5A9;
    --muted: #7A7065;
    --grid: rgba(13,13,13,0.06);
  }

  body {
    background: var(--cream);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .slide {
    width: 960px;
    min-height: 540px;
    background: var(--cream);
    position: relative;
    overflow: hidden;
    border: 1.5px solid var(--ink);
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto 1fr auto;
  }

  /* Grid overlay */
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header bar */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1.5px solid var(--ink);
    position: relative;
    z-index: 2;
    background: var(--cream);
  }

  .event-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-logo {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--ink);
    position: relative;
  }

  .brand-logo span {
    color: var(--coral);
  }

  .summit-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--sand);
    padding: 3px 8px;
  }

  /* Main content */
  .main {
    grid-column: 1;
    grid-row: 2;
    padding: 48px 40px 40px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 20px;
  }

  .headline-wrapper {
    position: relative;
  }

  .headline-dont {
    font-size: 72px;
    font-weight: 800;
    line-height: 0.92;
    color: var(--ink);
    text-decoration: line-through;
    text-decoration-color: var(--coral);
    text-decoration-thickness: 5px;
    letter-spacing: -0.03em;
    display: block;
    animation: fadeSlideUp 0.7s ease both;
  }

  .headline-sub {
    font-size: 72px;
    font-weight: 800;
    line-height: 0.92;
    color: var(--ink);
    letter-spacing: -0.03em;
    display: block;
    margin-top: 4px;
    animation: fadeSlideUp 0.7s 0.1s ease both;
  }

  .headline-action {
    font-size: 72px;
    font-weight: 800;
    line-height: 0.92;
    color: var(--coral);
    letter-spacing: -0.03em;
    display: block;
    margin-top: 4px;
    animation: fadeSlideUp 0.7s 0.2s ease both;
  }

  .headline-instead {
    font-size: 72px;
    font-weight: 800;
    line-height: 0.92;
    color: var(--ink);
    letter-spacing: -0.03em;
    display: block;
    margin-top: 4px;
    animation: fadeSlideUp 0.7s 0.3s ease both;
  }

  .tagline {
    margin-top: 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    max-width: 380px;
    animation: fadeSlideUp 0.7s 0.4s ease both;
  }

  /* Right panel — architecture diagram */
  .panel {
    grid-column: 2;
    grid-row: 2;
    border-left: 1.5px solid var(--ink);
    padding: 24px 20px 20px 20px;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
    background: rgba(245,240,232,0.92);
  }

  .panel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* Footer */
  .footer {
    grid-column: 1 / -1;
    grid-row: 3;
    border-top: 1.5px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    position: relative;
    z-index: 2;
    background: var(--cream);
  }

  .footer-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .presenter-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--sand);
  }

  .coral-pill {
    background: var(--coral);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
  }

  /* Decorative elements */
  .corner-mark {
    position: absolute;
    bottom: 20px;
    left: 40px;
    width: 48px;
    height: 48px;
    border: 1.5px solid var(--sand);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  .corner-mark::after {
    content: '×';
    font-size: 20px;
    color: var(--coral);
    font-weight: 800;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .blink {
    animation: blink 1.4s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* SVG node entrance animations */
  .node-engineer  { animation: nodeIn 0.5s 0.2s ease both; }
  .node-claude    { animation: nodeIn 0.5s 0.5s ease both; }
  .node-mcp2      { animation: nodeIn 0.5s 0.7s ease both; }
  .node-mcp3      { animation: nodeIn 0.5s 0.7s ease both; }
  .node-fs        { animation: nodeIn 0.5s 0.9s ease both; }
  .node-skills-label { animation: nodeIn 0.5s 1.1s ease both; }
  .node-skill1    { animation: nodeIn 0.5s 1.2s ease both; }
  .node-skill2    { animation: nodeIn 0.5s 1.3s ease both; }
  .node-skill3    { animation: nodeIn 0.5s 1.4s ease both; }
  .node-skill4    { animation: nodeIn 0.5s 1.5s ease both; }
  .node-legend    { animation: nodeIn 0.5s 1.6s ease both; }

  @keyframes nodeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Skill boxes soft pulse */
  .skill-pulse {
    animation: skillPulse 2.8s ease-in-out infinite;
  }
  .skill-pulse-2 {
    animation: skillPulse 2.8s 0.4s ease-in-out infinite;
  }
  .skill-pulse-3 {
    animation: skillPulse 2.8s 0.8s ease-in-out infinite;
  }
  .skill-pulse-4 {
    animation: skillPulse 2.8s 1.2s ease-in-out infinite;
  }
  @keyframes skillPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.65; }
  }

  /* Data dot travelling down the vertical arrow */
  .dot-flow-down {
    animation: dotDown 2s 1s ease-in-out infinite;
  }
  .dot-flow-down-2 {
    animation: dotDown 2s 1.8s ease-in-out infinite;
  }
  .dot-flow-coral {
    animation: dotDownCoral 2s 1.4s ease-in-out infinite;
  }
  @keyframes dotDown {
    0%   { cy: 40; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { cy: 62; opacity: 0; }
  }
  @keyframes dotDownCoral {
    0%   { cy: 152; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { cy: 174; opacity: 0; }
  }

  /* Data dots along horizontal arrows */
  .dot-left {
    animation: dotLeft 2.4s 1.2s ease-in-out infinite;
  }
  .dot-right {
    animation: dotRight 2.4s 1.5s ease-in-out infinite;
  }
  @keyframes dotLeft {
    0%   { cx: 72; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { cx: 42; opacity: 0; }
  }
  @keyframes dotRight {
    0%   { cx: 218; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { cx: 248; opacity: 0; }
  }

  /* Coral pill gentle glow */
  .coral-pill {
    animation: pillGlow 3s ease-in-out infinite;
  }
  @keyframes pillGlow {
    0%, 100% { box-shadow: none; }
    50% { box-shadow: 0 0 12px rgba(232,65,42,0.45); }
  }
</style>
</head>
<body>
<div class="slide">

  <!-- Header -->
  <header class="header">
    <div style="display:flex; align-items:center; gap:20px;">
      <span class="event-tag">2026</span>
    </div>
    <div class="brand">
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div>
      <p class="eyebrow">→ A better mental model</p>
      <div class="headline-wrapper">
        <span class="headline-dont">DON'T BUILD</span>
        <span class="headline-sub">AGENTS!</span>
        <span class="headline-action">BUILD SKILLS</span>
        <span class="headline-instead">INSTEAD.</span>
      </div>
      <p class="tagline">
        Skills are composable, testable, and reusable units.<br>
        Agents are just orchestrators of skills.<br>
        <span style="color: var(--coral);">─── Think in skills. Ship faster.</span>
      </p>
    </div>
  </main>

  <!-- Architecture Panel -->
  <aside class="panel">
    <p class="panel-label">Architecture</p>

    <svg viewBox="0 0 290 420" xmlns="http://www.w3.org/2000/svg" style="width:100%; flex:1; overflow:visible;" font-family="'JetBrains Mono', monospace">
      <defs>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="#7A7065"/>
        </marker>
        <marker id="arrow-coral" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="#E8412A"/>
        </marker>
      </defs>

      <!-- ── AI Engineer ── -->
      <g class="node-engineer">
        <rect x="80" y="8" width="130" height="32" fill="#0D0D0D" rx="0"/>
        <text x="145" y="28" text-anchor="middle" fill="#F5F0E8" font-size="11" font-weight="500">AI Engineer</text>
      </g>

      <!-- arrow down to Claude -->
      <line x1="145" y1="40" x2="145" y2="62" stroke="#7A7065" stroke-width="1.5" marker-end="url(#arrow)"/>
      <!-- travelling dot: Engineer → Claude -->
      <circle cx="145" cy="40" r="3" fill="#7A7065" class="dot-flow-down"/>

      <!-- ── Claude Agent ── -->
      <g class="node-claude">
        <rect x="72" y="64" width="146" height="32" fill="#0D0D0D" rx="0"/>
        <text x="145" y="84" text-anchor="middle" fill="#F5F0E8" font-size="11" font-weight="500">Claude (Agent)</text>
      </g>

      <!-- bidirectional arrows to MCP servers -->
      <!-- left arrow to MCP 2 -->
      <line x1="72" y1="80" x2="42" y2="80" stroke="#7A7065" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="42" y1="86" x2="72" y2="86" stroke="#7A7065" stroke-width="1.5" marker-end="url(#arrow)"/>
      <!-- travelling dot left -->
      <circle cx="72" cy="80" r="2.5" fill="#7A7065" class="dot-left"/>

      <!-- right arrow to MCP 3 -->
      <line x1="218" y1="80" x2="248" y2="80" stroke="#7A7065" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="248" y1="86" x2="218" y2="86" stroke="#7A7065" stroke-width="1.5" marker-end="url(#arrow)"/>
      <!-- travelling dot right -->
      <circle cx="218" cy="86" r="2.5" fill="#7A7065" class="dot-right"/>

      <!-- MCP Server 2 box -->
      <g class="node-mcp2">
        <rect x="1" y="64" width="70" height="32" fill="#F5F0E8" rx="0" stroke="#0D0D0D" stroke-width="1.5"/>
        <text x="36" y="76" text-anchor="middle" fill="#0D0D0D" font-size="8">MCP</text>
        <text x="36" y="88" text-anchor="middle" fill="#0D0D0D" font-size="8">Server 2</text>
      </g>

      <!-- MCP Server 3 box -->
      <g class="node-mcp3">
        <rect x="219" y="64" width="70" height="32" fill="#F5F0E8" rx="0" stroke="#0D0D0D" stroke-width="1.5"/>
        <text x="254" y="76" text-anchor="middle" fill="#0D0D0D" font-size="8">MCP</text>
        <text x="254" y="88" text-anchor="middle" fill="#0D0D0D" font-size="8">Server 3</text>
      </g>

      <!-- arrow down to Filesystem -->
      <line x1="145" y1="96" x2="145" y2="118" stroke="#7A7065" stroke-width="1.5" marker-end="url(#arrow)"/>
      <!-- travelling dot: Claude → Filesystem -->
      <circle cx="145" cy="96" r="3" fill="#7A7065" class="dot-flow-down-2"/>

      <!-- ── Filesystem ── -->
      <g class="node-fs">
        <rect x="80" y="120" width="130" height="32" fill="#F5F0E8" rx="0" stroke="#0D0D0D" stroke-width="1.5"/>
        <text x="145" y="140" text-anchor="middle" fill="#0D0D0D" font-size="11">Filesystem</text>
      </g>

      <!-- arrow down to Skills section -->
      <line x1="145" y1="152" x2="145" y2="174" stroke="#E8412A" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-coral)"/>
      <!-- travelling dot: Filesystem → Skills (coral) -->
      <circle cx="145" cy="152" r="3" fill="#E8412A" class="dot-flow-coral"/>

      <!-- Skills layer label -->
      <g class="node-skills-label">
        <text x="145" y="192" text-anchor="middle" fill="#E8412A" font-size="8.5" letter-spacing="2">SKILLS LAYER</text>
      </g>

      <!-- Skill boxes row 1 -->
      <g class="node-skill1 skill-pulse">
        <rect x="16" y="200" width="116" height="36" fill="#E8412A" rx="0"/>
        <text x="74" y="215" text-anchor="middle" fill="#fff" font-size="10" font-weight="500">Skill</text>
        <text x="74" y="229" text-anchor="middle" fill="#fff" font-size="8" opacity="0.8">read · write · search</text>
      </g>

      <g class="node-skill2 skill-pulse-2">
        <rect x="158" y="200" width="116" height="36" fill="#E8412A" rx="0"/>
        <text x="216" y="215" text-anchor="middle" fill="#fff" font-size="10" font-weight="500">Skill</text>
        <text x="216" y="229" text-anchor="middle" fill="#fff" font-size="8" opacity="0.8">parse · transform</text>
      </g>

      <!-- Skill boxes row 2 -->
      <g class="node-skill3 skill-pulse-3">
        <rect x="16" y="244" width="116" height="36" fill="#F5F0E8" rx="0" stroke="#0D0D0D" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text x="74" y="259" text-anchor="middle" fill="#7A7065" font-size="10">Skill</text>
        <text x="74" y="273" text-anchor="middle" fill="#7A7065" font-size="8">summarise · draft</text>
      </g>

      <g class="node-skill4 skill-pulse-4">
        <rect x="158" y="244" width="116" height="36" fill="#F5F0E8" rx="0" stroke="#0D0D0D" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text x="216" y="259" text-anchor="middle" fill="#7A7065" font-size="10">Skill</text>
        <text x="216" y="273" text-anchor="middle" fill="#7A7065" font-size="8">analyse · report</text>
      </g>

      <!-- legend -->
      <g class="node-legend">
        <rect x="16" y="298" width="10" height="10" fill="#E8412A"/>
        <text x="32" y="308" fill="#7A7065" font-size="8">active skill</text>
        <rect x="100" y="298" width="10" height="10" fill="#F5F0E8" stroke="#0D0D0D" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="116" y="308" fill="#7A7065" font-size="8">composable skill</text>
      </g>

      <!-- bottom note -->
      <text x="145" y="336" text-anchor="middle" fill="#7A7065" font-size="8" letter-spacing="1" class="node-legend">callable · testable · reusable</text>
    </svg>

  </aside>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-left"></div>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="coral-pill">Build Skills</span>
      <span style="font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted);">not agents</span>
    </div>
  </footer>

</div>
</body>
</html>
